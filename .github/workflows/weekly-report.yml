name: Weekly Meta Ads Report

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_TOKEN_EXPIRY: ${{ secrets.META_TOKEN_EXPIRY }}
          META_AD_ACCOUNT_ID_KOCSKIN: ${{ secrets.META_AD_ACCOUNT_ID_KOCSKIN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID_WEEKLY_REPORT: ${{ secrets.NOTION_DATABASE_ID_WEEKLY_REPORT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Deploy HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: .
          keep_files: false

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-report-html
          path: output/*.html
          retention-days: 30
