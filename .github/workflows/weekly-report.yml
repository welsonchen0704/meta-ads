name: Meta Weekly Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  run-weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (CJK fonts for PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly report
        env:
          META_USER_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID_KOCSKIN: ${{ secrets.META_AD_ACCOUNT_ID_KOCSKIN }}
          META_AD_ACCOUNT_ID_XIAOYAN: ${{ secrets.META_AD_ACCOUNT_ID_XIAOYAN }}
          META_PAGE_ID_KOCSKIN: ${{ secrets.META_PAGE_ID_KOCSKIN }}
          META_PAGE_ID_CAMPING: ${{ secrets.META_PAGE_ID_CAMPING }}
          META_PAGE_ACCESS_TOKEN_KOCSKIN: ${{ secrets.META_PAGE_ACCESS_TOKEN_KOCSKIN }}
          META_PAGE_ACCESS_TOKEN_CAMPING: ${{ secrets.META_PAGE_ACCESS_TOKEN_CAMPING }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID_WEEKLY_REPORT: ${{ secrets.NOTION_DATABASE_ID_WEEKLY_REPORT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-pdf
          path: "*.pdf"
          retention-days: 30
          if-no-files-found: ignore
